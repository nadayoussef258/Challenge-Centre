<section class="stats" id="stats">
  <div class="stats-inner">
    <div class="container">
      <div class="stats-header">
        <div class="accent-bar" style="background: var(--accent); margin: 0 auto 20px;"></div>
        <h2 class="section-title" style="color: var(--white);">خطوات الالتحاق بالمركز</h2>
        <p class="section-subtitle" style="color: rgba(255,255,255,0.75); margin: 0 auto;">
          إجراءات واضحة وبسيطة للانضمام إلى مركز التحدي وبدء رحلة التأهيل
        </p>
      </div>
      <div class="steps-grid">
        <div class="step-card" *ngFor="let s of steps; let i = index">
          <div class="step-num">{{ i + 1 }}</div>
<div class="step-icon"><i [class]="s.icon" style="color: var(--white);"></i></div>
          <div class="step-title">{{ s.title }}</div>
          <div class="step-desc">{{ s.desc }}</div>
        </div>
      </div>
    </div>
  </div>


</section>
