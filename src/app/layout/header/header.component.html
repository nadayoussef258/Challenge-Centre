<header class="header" [class.scrolled]="isScrolled">
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <img src="ChallengeLogo.png" alt="مركز التحدي" class="logo-img" />
        <div class="logo-text">
          <span class="logo-name">مركز التحدي</span>
          <span class="logo-tagline"> للتدريب والتأهيل</span>
        </div>
      </div>

      <nav class="nav" [class.open]="menuOpen">
        <a href="#about" (click)="closeMenu()">من نحن</a>
        <a href="#services" (click)="closeMenu()">خدماتنا</a>
        <a href="#stats" (click)="closeMenu()">إنجازاتنا</a>
        <a href="#contact" (click)="closeMenu()">تواصل معنا</a>
        <a href="#contact" class="nav-cta" (click)="closeMenu()">احجز الآن</a>
      </nav>

      <button class="hamburger" (click)="toggleMenu()" [class.active]="menuOpen" aria-label="القائمة">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
<div class="nav-overlay" [class.show]="menuOpen" (click)="closeMenu()"></div>
